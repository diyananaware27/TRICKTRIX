<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TrickTrix - Online Quiz</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #6a11cb, #2575fc);
      color: #fff;
    }
    .container {
      text-align: center;
      background: rgba(255, 255, 255, 0.1);
      padding: 50px;
      border-radius: 20px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }
    h1 {
      font-size: 3rem;
      margin-bottom: 20px;
    }
    p {
      font-size: 1.2rem;
      margin-bottom: 30px;
    }
    .start-btn {
      background: #ffcc00;
      color: #000;
      padding: 15px 40px;
      border: none;
      border-radius: 30px;
      font-size: 1.2rem;
      cursor: pointer;
      transition: transform 0.3s, background 0.3s;
    }
    .start-btn:hover {
      background: #ffaa00;
      transform: scale(1.1);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Welcome to TrickTrix</h1>
    <p>Fun and Interactive Online Quiz Application</p>
    <button class="start-btn" onclick="location.href='login.html'">Start</button>
  </div>
</body>
</html>
